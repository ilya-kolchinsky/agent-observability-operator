apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: no-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-no-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    enabled: true
    language: python
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    mode: sdk-and-runtime-coordinator
  runtimeCoordinator:
    enabled: true
    diagnosticsLevel: basic
    heuristics:
      detectExistingProvider: true
      detectSpanProcessors: true
      detectFrameworkInstrumentation: true
      detectKnownVendorTracing: true
    patchers:
      httpClient: true
      grpcClient: true
      asgi: true
      wsgi: false
      genaiOpenAI: true
      mcpBoundary: true
    suppression:
      disableDuplicateInstrumentations: true
  demo:
    createSampleWorkload: false
    sampleAppVariant: no-existing
