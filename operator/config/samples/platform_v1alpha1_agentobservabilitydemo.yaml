apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: sample-agent-observability-demo
  namespace: default
spec:
  target:
    namespace: default
    workloadName: agent-chat
    workloadKind: Deployment
    containerName: app
  instrumentation:
    enabled: true
    language: python
    customPythonImage: ghcr.io/example/custom-python:latest
    otelCollectorEndpoint: http://otel-collector.default.svc.cluster.local:4317
    mode: sdk-and-runtime-coordinator
  runtimeCoordinator:
    enabled: true
    diagnosticsLevel: basic
    heuristics:
      detectExistingProvider: true
      detectSpanProcessors: true
      detectFrameworkInstrumentation: true
      detectKnownVendorTracing: true
    patchers:
      httpClient: true
      grpcClient: true
      asgi: true
      wsgi: false
      genaiOpenAI: true
      mcpBoundary: true
    suppression:
      disableDuplicateInstrumentations: true
  demo:
    createSampleWorkload: true
    sampleAppVariant: chat
