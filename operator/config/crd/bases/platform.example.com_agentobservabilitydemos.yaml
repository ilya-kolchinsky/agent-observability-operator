apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentobservabilitydemos.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: AgentObservabilityDemo
    listKind: AgentObservabilityDemoList
    plural: agentobservabilitydemos
    singular: agentobservabilitydemo
    shortNames:
      - aodemo
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.targetWorkloadRef
          name: Target
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - target
                - instrumentation
                - runtimeCoordinator
                - demo
              properties:
                target:
                  type: object
                  properties:
                    namespace:
                      type: string
                    workloadName:
                      type: string
                    workloadKind:
                      type: string
                    containerName:
                      type: string
                instrumentation:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    language:
                      type: string
                    customPythonImage:
                      type: string
                    otelCollectorEndpoint:
                      type: string
                    mode:
                      type: string
                runtimeCoordinator:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    diagnosticsLevel:
                      type: string
                    heuristics:
                      type: object
                      properties:
                        detectExistingProvider:
                          type: boolean
                        detectSpanProcessors:
                          type: boolean
                        detectFrameworkInstrumentation:
                          type: boolean
                        detectKnownVendorTracing:
                          type: boolean
                    patchers:
                      type: object
                      properties:
                        httpClient:
                          type: boolean
                        grpcClient:
                          type: boolean
                        asgi:
                          type: boolean
                        wsgi:
                          type: boolean
                        genaiOpenAI:
                          type: boolean
                        mcpBoundary:
                          type: boolean
                    suppression:
                      type: object
                      properties:
                        disableDuplicateInstrumentations:
                          type: boolean
                demo:
                  type: object
                  properties:
                    createSampleWorkload:
                      type: boolean
                    sampleAppVariant:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                generatedInstrumentationName:
                  type: string
                generatedConfigMapName:
                  type: string
                targetWorkloadRef:
                  type: string
                message:
                  type: string
