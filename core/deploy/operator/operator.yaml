apiVersion: v1
kind: Namespace
metadata:
  name: agent-observability-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-observability-operator
  namespace: agent-observability-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-observability-operator
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["platform.example.com"]
    resources: ["autoinstrumentations"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["platform.example.com"]
    resources: ["autoinstrumentations/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["opentelemetry.io"]
    resources: ["instrumentations"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-observability-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-observability-operator
subjects:
  - kind: ServiceAccount
    name: agent-observability-operator
    namespace: agent-observability-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-observability-operator
  namespace: agent-observability-system
  labels:
    app.kubernetes.io/name: agent-observability-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-observability-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-observability-operator
    spec:
      serviceAccountName: agent-observability-operator
      containers:
        - name: manager
          image: agent-observability/operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
