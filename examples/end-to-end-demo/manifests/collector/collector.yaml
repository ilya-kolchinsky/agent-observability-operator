apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: demo-collector
  namespace: observability
spec:
  mode: deployment
  managementState: managed
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      debug:
        verbosity: normal
      otlp:
        endpoint: jaeger-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - batch
          exporters:
            - debug
            - otlp
---
# Stable, human-friendly endpoint for app workloads and generated Instrumentation
# resources. The OpenTelemetry Operator still owns the actual Collector Deployment
# and its generated Service, while this alias keeps a predictable DNS name.
apiVersion: v1
kind: Service
metadata:
  name: agent-observability-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: agent-observability-collector
spec:
  type: ExternalName
  externalName: demo-collector-collector.observability.svc.cluster.local
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
