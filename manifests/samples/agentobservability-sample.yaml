# Sample 1: NO EXISTING tracing - Platform owns EVERYTHING
# Demo: App has zero tracing code, platform provides full observability
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: no-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-no-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    tracerProvider: platform  # Platform initializes provider
    fastapi: true             # Platform instruments FastAPI
    httpx: true               # Platform instruments httpx
    requests: true            # Platform instruments requests
    langchain: true           # Platform instruments LangChain
    mcp: true                 # Platform instruments MCP
---
# Sample 2: PARTIAL EXISTING tracing - Mixed ownership
# Demo: App handles some instrumentation, platform handles the rest
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: partial-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-partial-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    tracerProvider: platform  # Platform still owns provider
    fastapi: false            # App instruments FastAPI in main.py
    httpx: true               # Platform handles httpx
    requests: true            # Platform handles requests
    langchain: false          # App instruments LangChain in main.py
    mcp: true                 # Platform handles MCP
---
# Sample 3: FULL EXISTING tracing - App owns EVERYTHING
# Demo: App has complete tracing setup, platform stays out of the way
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: full-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-full-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    tracerProvider: app       # App initializes provider in main.py
    fastapi: false            # App instruments everything itself
    httpx: false
    requests: false
    langchain: false
    mcp: false
