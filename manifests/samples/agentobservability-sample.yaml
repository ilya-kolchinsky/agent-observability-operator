# Sample 1: NO EXISTING tracing - Platform owns EVERYTHING
# Demo: App has zero tracing code, platform provides full observability
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: no-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-no-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    enableInstrumentation: true
    tracerProvider: platform  # Platform initializes provider
    fastapi: true             # Platform instruments FastAPI
    httpx: true               # Platform instruments httpx
    requests: true            # Platform instruments requests
    langchain: true           # Platform instruments LangChain
    mcp: true                 # Platform instruments MCP
    openai: true              # Platform instruments OpenAI SDK
---
# Sample 2: PARTIAL EXISTING tracing - Mixed ownership
# Demo: App initializes TracerProvider and handles some instrumentation, platform handles the rest
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: partial-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-partial-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    enableInstrumentation: true
    tracerProvider: app       # App owns provider (inferred from fastapi: false)
    fastapi: false            # App instruments FastAPI in main.py
    httpx: true               # Platform handles httpx
    requests: true            # Platform handles requests
    langchain: false          # App instruments LangChain in main.py
    mcp: true                 # Platform handles MCP
    openai: true              # Platform handles OpenAI SDK
---
# Sample 3: FULL EXISTING tracing - App owns EVERYTHING
# Demo: App has complete tracing setup, platform stays out of the way
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: full-existing
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-full-existing
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    enableInstrumentation: false  # Platform should NOT auto-instrument
    tracerProvider: app           # App initializes provider in main.py
    fastapi: false                # App instruments everything itself
    httpx: false
    requests: false
    langchain: false
    mcp: false
    openai: false                 # App instruments OpenAI SDK in main.py
---
# Sample 4: AUTO-DETECTION - Demonstrates autoDetection feature
# Demo: Single setting enables auto-detection for all supported libraries
apiVersion: platform.example.com/v1alpha1
kind: AgentObservabilityDemo
metadata:
  name: auto-httpx
  namespace: demo-apps
spec:
  target:
    namespace: demo-apps
    workloadName: agent-auto-httpx
    workloadKind: Deployment
    containerName: app
  instrumentation:
    customPythonImage: agent-observability/custom-python-autoinstrumentation:latest
    otelCollectorEndpoint: http://agent-observability-collector.observability.svc.cluster.local:4318
    autoDetection: true           # ENABLES AUTO-DETECTION for all supported libraries (FastAPI, HTTPX, Requests, OpenAI)
    langchain: false              # Explicit override: App instruments LangChain in main.py
    mcp: true                     # Explicit override: Platform handles MCP (no auto-detection support)
    # Note: FastAPI, HTTPX, Requests, OpenAI automatically get "auto" via autoDetection
    # - FastAPI: App uses FastAPI() → platform detects → platform owns
    # - HTTPX: App instruments → wrapper observes → app owns
    # - Requests: App neither instruments nor uses → UNDECIDED → not instrumented
    # - OpenAI: App uses OpenAI() → platform detects → platform owns
