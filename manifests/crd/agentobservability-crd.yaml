apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentobservabilitydemos.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: AgentObservabilityDemo
    listKind: AgentObservabilityDemoList
    plural: agentobservabilitydemos
    singular: agentobservabilitydemo
    shortNames:
      - aodemo
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.targetWorkloadRef
          name: Target
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - target
                - instrumentation
              properties:
                target:
                  type: object
                  required:
                    - namespace
                    - workloadName
                    - workloadKind
                    - containerName
                  properties:
                    namespace:
                      type: string
                      description: Target workload namespace
                    workloadName:
                      type: string
                      description: Target workload name
                    workloadKind:
                      type: string
                      description: Target workload kind (e.g., Deployment)
                      default: Deployment
                    containerName:
                      type: string
                      description: Target container name within the workload
                instrumentation:
                  type: object
                  required:
                    - tracerProvider
                  properties:
                    customPythonImage:
                      type: string
                      description: Custom Python auto-instrumentation image
                      default: agent-observability/custom-python-autoinstrumentation:latest
                    otelCollectorEndpoint:
                      type: string
                      description: OpenTelemetry collector endpoint
                      default: http://agent-observability-collector.observability.svc.cluster.local:4318
                    tracerProvider:
                      type: string
                      description: Who owns TracerProvider initialization
                      enum:
                        - platform
                        - app
                      default: platform
                    fastapi:
                      type: boolean
                      description: Enable FastAPI instrumentation
                      default: true
                    httpx:
                      type: boolean
                      description: Enable httpx client instrumentation
                      default: true
                    requests:
                      type: boolean
                      description: Enable requests library instrumentation
                      default: true
                    langchain:
                      type: boolean
                      description: Enable LangChain instrumentation
                      default: false
                    langgraph:
                      type: boolean
                      description: Enable LangGraph instrumentation
                      default: false
                    mcp:
                      type: boolean
                      description: Enable MCP boundary instrumentation
                      default: false
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                generatedInstrumentationName:
                  type: string
                generatedConfigMapName:
                  type: string
                targetWorkloadRef:
                  type: string
                message:
                  type: string
