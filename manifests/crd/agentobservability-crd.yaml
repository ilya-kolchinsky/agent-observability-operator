apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentobservabilitydemos.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: AgentObservabilityDemo
    listKind: AgentObservabilityDemoList
    plural: agentobservabilitydemos
    singular: agentobservabilitydemo
    shortNames:
      - aodemo
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.targetWorkloadRef
          name: Target
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - target
              properties:
                target:
                  type: object
                  required:
                    - namespace
                    - workloadName
                    - workloadKind
                    - containerName
                  properties:
                    namespace:
                      type: string
                      description: Target workload namespace
                    workloadName:
                      type: string
                      description: Target workload name
                    workloadKind:
                      type: string
                      description: Target workload kind (e.g., Deployment)
                      default: Deployment
                    containerName:
                      type: string
                      description: Target container name within the workload
                instrumentation:
                  type: object
                  properties:
                    customPythonImage:
                      type: string
                      description: Custom Python auto-instrumentation image
                    otelCollectorEndpoint:
                      type: string
                      description: OpenTelemetry collector endpoint
                    enableInstrumentation:
                      type: boolean
                      description: |
                        Controls whether auto-instrumentation is enabled.
                        If true, auto-instrumentation is enabled with library defaults.
                        If false, auto-instrumentation is disabled regardless of other settings.
                        If omitted and other instrumentation fields are specified, defaults to true.
                        If omitted and no other instrumentation fields are specified, defaults to false.
                    tracerProvider:
                      type: string
                      description: |
                        Who owns TracerProvider initialization (platform or app).
                        If omitted, inferred from library field values:
                        - All library fields true (or default) means platform
                        - At least one library field false means app
                      enum:
                        - platform
                        - app
                    fastapi:
                      type: boolean
                      description: Enable FastAPI instrumentation (defaults to true when enableInstrumentation is true)
                    httpx:
                      description: |-
                        Enable httpx client instrumentation. Can be:
                        - true: Platform instruments (explicit)
                        - false: App instruments (explicit)
                        - "auto": Runtime ownership resolution (auto-detection)
                        - omitted: Defaults to true when enableInstrumentation is true
                      x-kubernetes-preserve-unknown-fields: true
                      nullable: true
                    requests:
                      type: boolean
                      description: Enable requests library instrumentation (defaults to true when enableInstrumentation is true)
                    langchain:
                      type: boolean
                      description: Enable LangChain instrumentation (defaults to true when enableInstrumentation is true)
                    mcp:
                      type: boolean
                      description: Enable MCP boundary instrumentation (defaults to true when enableInstrumentation is true)
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                generatedInstrumentationName:
                  type: string
                generatedConfigMapName:
                  type: string
                targetWorkloadRef:
                  type: string
                message:
                  type: string
